<!--
  Marie Emailing Widget — Grist
  Prospection ESN conseils départementaux : liste de contacts, modèles d'email, envoi via n8n
-->
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Marie Emailing</title>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg: #FAFAFC;
      --color-primary: #2A2F6B;
      --color-accent: #3B82F6;
      --color-green: #16B378;
      --color-orange: #F0AD4E;
      --color-red: #D9534F;
      --color-text-muted: #6B7280;
      --color-border: #E2E4EC;
      --radius: 10px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--color-bg);
      color: var(--color-primary);
      font-size: 14px;
      line-height: 1.5;
    }
    .hidden { display: none !important; }
    button { font-family: inherit; cursor: pointer; }
    input, select, textarea { font-family: inherit; font-size: 14px; }

    #not-in-grist { padding: 40px; text-align: center; color: var(--color-text-muted); }

    /* ===== TABS ===== */
    .app-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px; border-bottom: 1px solid var(--color-border); background: #fff;
      flex-wrap: wrap; gap: 10px;
    }
    .app-header h1 { font-size: 18px; font-weight: 700; }
    .tabs { display: flex; gap: 4px; }
    .tab-btn {
      border: none; background: transparent; padding: 8px 14px; border-radius: 8px;
      font-weight: 600; color: var(--color-text-muted);
    }
    .tab-btn.active { background: var(--color-primary); color: #fff; }
    .tab-panel { padding: 16px 20px; }

    /* ===== TOOLBAR / FILTERS ===== */
    .toolbar {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 12px;
    }
    .toolbar select, .toolbar input[type="text"] {
      padding: 7px 10px; border: 1px solid var(--color-border); border-radius: 8px; background: #fff;
    }
    .spacer { flex: 1; }
    .btn {
      padding: 8px 14px; border-radius: 8px; border: 1px solid var(--color-border);
      background: #fff; font-weight: 600; color: var(--color-primary);
    }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn-primary { background: var(--color-primary); color: #fff; border-color: var(--color-primary); }
    .btn-danger { background: var(--color-red); color: #fff; border-color: var(--color-red); }
    .btn-sm { padding: 4px 8px; font-size: 12px; border-radius: 6px; }

    .selection-bar {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      background: #EEF2FF; border: 1px solid #C7D2FE; border-radius: 8px; padding: 8px 12px; margin-bottom: 10px;
    }

    /* ===== TABLE ===== */
    table.contacts-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: var(--radius); overflow: hidden; }
    table.contacts-table th, table.contacts-table td {
      padding: 8px 10px; border-bottom: 1px solid var(--color-border); text-align: left; font-size: 13px; vertical-align: middle;
    }
    table.contacts-table th { background: #F3F4F8; font-weight: 700; position: sticky; top: 0; }
    table.contacts-table tr:hover td { background: #FAFBFF; }
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 700;
    }
    .row-select { width: 16px; height: 16px; }
    .mini-select { padding: 3px 6px; border-radius: 6px; border: 1px solid var(--color-border); font-size: 12px; }
    .email-cell { font-family: 'SFMono-Regular', Consolas, monospace; font-size: 12px; }

    /* ===== TEMPLATES ===== */
    .templates-grid { display: grid; grid-template-columns: 260px 1fr; gap: 16px; }
    .template-list { display: flex; flex-direction: column; gap: 6px; }
    .template-item {
      padding: 10px 12px; border: 1px solid var(--color-border); border-radius: 8px; background: #fff;
      cursor: pointer; display: flex; justify-content: space-between; align-items: center;
    }
    .template-item.active { border-color: var(--color-primary); background: #EEF2FF; }
    .template-editor { background: #fff; border: 1px solid var(--color-border); border-radius: var(--radius); padding: 16px; }
    .field-label { font-weight: 700; font-size: 12px; color: var(--color-text-muted); margin: 10px 0 4px; text-transform: uppercase; letter-spacing: .04em; }
    .field-label:first-child { margin-top: 0; }
    .template-editor input[type="text"], .template-editor textarea {
      width: 100%; padding: 8px 10px; border: 1px solid var(--color-border); border-radius: 8px;
    }
    .template-editor textarea { min-height: 220px; resize: vertical; font-family: inherit; }
    .variables-hint { font-size: 12px; color: var(--color-text-muted); margin-top: 6px; }
    .variables-hint code { background: #F3F4F8; padding: 1px 5px; border-radius: 4px; }

    /* ===== SETTINGS ===== */
    .settings-form { max-width: 640px; background: #fff; border: 1px solid var(--color-border); border-radius: var(--radius); padding: 20px; }
    .settings-form .field-label { margin-top: 16px; }
    .settings-form input[type="text"] { width: 100%; padding: 8px 10px; border: 1px solid var(--color-border); border-radius: 8px; }
    .hint { font-size: 12px; color: var(--color-text-muted); margin-top: 4px; }

    /* ===== TOAST ===== */
    #toast-container { position: fixed; bottom: 16px; right: 16px; display: flex; flex-direction: column; gap: 8px; z-index: 999; }
    .toast {
      padding: 10px 14px; border-radius: 8px; color: #fff; font-weight: 600; font-size: 13px;
      box-shadow: 0 4px 14px rgba(0,0,0,.15); max-width: 360px;
    }
    .toast-success { background: var(--color-green); }
    .toast-error { background: var(--color-red); }
    .toast-info { background: var(--color-primary); }

    /* ===== SEND MODAL ===== */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(20,20,30,.45); display: flex;
      align-items: center; justify-content: center; z-index: 500;
    }
    .modal { background: #fff; border-radius: 12px; width: 560px; max-width: 92vw; max-height: 86vh; overflow: auto; }
    .modal-header { padding: 16px 20px; border-bottom: 1px solid var(--color-border); display: flex; justify-content: space-between; align-items: center; }
    .modal-header h2 { font-size: 16px; }
    .modal-close { border: none; background: none; font-size: 18px; color: var(--color-text-muted); }
    .modal-body { padding: 16px 20px; }
    .modal-footer { padding: 14px 20px; border-top: 1px solid var(--color-border); display: flex; justify-content: flex-end; gap: 10px; }
    .warning-box { background: #FEF3E2; border: 1px solid var(--color-orange); border-radius: 8px; padding: 10px 12px; font-size: 13px; margin-bottom: 10px; }
    .error-box { background: #FDEDED; border: 1px solid var(--color-red); border-radius: 8px; padding: 10px 12px; font-size: 13px; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div id="not-in-grist" class="hidden">
    <p>Ce widget doit être ouvert à l'intérieur d'un document Grist.</p>
  </div>

  <div id="main-content">
    <div class="app-header">
      <h1>📧 Emailing prospection ESN</h1>
      <div class="tabs">
        <button class="tab-btn active" data-tab="contacts" onclick="switchTab('contacts')">Contacts</button>
        <button class="tab-btn" data-tab="templates" onclick="switchTab('templates')">Modèles</button>
        <button class="tab-btn" data-tab="settings" onclick="switchTab('settings')">Paramètres</button>
      </div>
    </div>

    <div id="tab-contacts" class="tab-panel"></div>
    <div id="tab-templates" class="tab-panel hidden"></div>
    <div id="tab-settings" class="tab-panel hidden"></div>
  </div>

  <div id="modal-container"></div>
  <div id="toast-container"></div>

  <script src="widget.js"></script>
</body>
</html>
